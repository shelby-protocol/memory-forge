name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ["18", "20", "22"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npx tsx src/test.ts
      - run: npx tsx src/scenario-test.ts
      - run: npx tsx src/shelby-test.ts
      - run: npx tsx src/setup-test.ts
      - run: npx tsx src/import-test.ts
      - run: npx tsx src/embed-test.ts
      - run: npx tsx src/transcript-test.ts
